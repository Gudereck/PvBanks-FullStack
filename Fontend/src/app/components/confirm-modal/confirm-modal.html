@if (config) {
  <div class="modal-backdrop" (click)="cancel()" role="dialog" aria-modal="true"
       [attr.aria-labelledby]="'modal-title'">

    <div class="modal-panel" (click)="$event.stopPropagation()">

      <div class="modal-icon" [class.danger]="config.danger">
        @if (config.danger) {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        }
      </div>

      <h2 id="modal-title" class="modal-title">{{ config.title }}</h2>
      <p class="modal-message">{{ config.message }}</p>

      <div class="modal-actions">
        <button class="btn-cancel" (click)="cancel()" type="button">
          {{ config.cancelLabel ?? 'Cancelar' }}
        </button>
        <button class="btn-confirm" [class.danger]="config.danger" (click)="confirm()" type="button">
          {{ config.confirmLabel ?? 'Confirmar' }}
        </button>
      </div>

    </div>
  </div>
}
