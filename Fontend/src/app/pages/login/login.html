<div class="login-container">
    <div class="login-card">
        <h2>PvBanks</h2>
        <p style="color: #888; margin-bottom: 20px;">Acesse sua conta</p>

        <form (submit)="fazerLogin()">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" name="email" [(ngModel)]="loginData.email" placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="senha" [(ngModel)]="loginData.senha" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login">ENTRAR</button>

            <div style="margin-top: 15px;">
                <span style="color: #888; font-size: 0.9rem;">Não tem conta? </span>
                <a routerLink="/cadastro"
                    style="color: #ff8a00; text-decoration: none; font-size: 0.9rem; font-weight: bold;">
                    Cadastre-se agora.
                </a>
            </div>
        </form>
    </div>
</div>
