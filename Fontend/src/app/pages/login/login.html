<div class="login-container">
    <div class="login-card">
        <h2>PvBanks</h2>
        <p class="subtitle">Acesse sua conta</p>

        <form (submit)="fazerLogin()">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" name="email" [(ngModel)]="loginData.email" placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="senha" [(ngModel)]="loginData.senha" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login">ENTRAR</button>

            <div class="login-footer">
                <span>Não tem conta? </span>
                <a routerLink="/cadastro">
                    Cadastre-se agora.
                </a>
            </div>
        </form>
    </div>
</div>
