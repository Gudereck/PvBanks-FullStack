<div class="form-container">
    <h2>Nova Transação</h2>

    <form (ngSubmit)="salvar()">

        <div class="campo">
            <label>Descrição</label>
            <input type="text" name="descricao" [(ngModel)]="transacao.descricao" required
                placeholder="Ex: Conta de Luz">
        </div>

        <div class="linha-dupla">
            <div class="campo">
                <label>Valor (R$)</label>
                <input type="number" name="valor" [(ngModel)]="transacao.valor" required step="0.01">
            </div>

            <div class="campo">
                <label>Data</label>
                <input type="date" name="data" [(ngModel)]="transacao.data" required>
            </div>
        </div>

        <div class="linha-dupla">
            <div class="campo">
                <label>Tipo</label>
                <select name="tipo" [(ngModel)]="transacao.tipo">
                    <option value="RECEITA">Receita</option>
                    <option value="DESPESA">Despesa</option>
                </select>
            </div>

            <div class="campo">
                <label>Categoria</label>
                <input type="text" name="categoria" [(ngModel)]="transacao.categoria" required
                    placeholder="Ex: Moradia">
            </div>
        </div>

        <div class="botoes">
            <button type="button" class="btn-cancelar" (click)="cancelar()">Cancelar</button>
            <button type="submit" class="btn-salvar">Salvar Transação</button>
        </div>

    </form>
</div>
